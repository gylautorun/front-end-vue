# ========================================
# Nginx配置文件
# 用于Vue前端项目的反向代理和静态资源服务
# 支持SPA路由、静态资源缓存、gzip压缩
# ========================================

# 全局配置块
# user: 指定Nginx运行的用户和用户组
user nginx;

# worker_processes: 工作进程数，设置为auto自动检测CPU核心数
# 建议设置为CPU核心数或2倍，充分利用多核CPU
worker_processes auto;

# error_log: 错误日志路径和级别
# notice级别记录重要的通知信息和错误
error_log /var/log/nginx/error.log notice;

# pid: Nginx进程ID文件路径
pid /var/run/nginx.pid;

# events块: 处理连接相关的配置
events {
    # worker_connections: 每个工作进程最大并发连接数
    # 1024是保守值，可根据服务器性能调整
    worker_connections 1024;
}

# http块: HTTP协议相关配置
http {
    # include: 引入MIME类型定义文件
    # /etc/nginx/mime.types包含常见文件类型与Content-Type的映射
    include       /etc/nginx/mime.types;
    
    # default_type: 默认的Content-Type
    # application/octet-stream表示二进制流，浏览器会下载
    default_type  application/octet-stream;

    # log_format: 定义日志格式
    # main格式包含了客户端IP、用户、时间、请求、状态码、响应大小等信息
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # access_log: 访问日志路径和使用的格式
    access_log  /var/log/nginx/access.log  main;

    # sendfile: 开启高效文件传输模式
    # 启用后Nginx使用sendfile系统调用直接将文件从磁盘发送到网络
    sendfile        on;

    # keepalive_timeout: 长连接超时时间（秒）
    # 客户端与服务器之间的连接保持时间，减少连接建立开销
    keepalive_timeout  65;

    # gzip: 开启gzip压缩
    # 压缩HTML、CSS、JS等文本文件，减小传输体积
    gzip  on;
    
    # gzip_types: 指定需要压缩的MIME类型
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # server块: 虚拟主机配置
    server {
        # listen: 监听的端口
        listen       80;
        
        # server_name: 虚拟主机名称，支持多个域名或IP
        server_name  localhost;

        # root: 网站根目录
        # /usr/share/nginx/html是Nginx默认的静态资源目录
        root /usr/share/nginx/html;
        
        # index: 默认首页文件，按顺序查找
        index index.html index.htm;

        # location /: 处理根路径请求
        location / {
            # try_files: 按顺序尝试文件或目录
            # $uri: 当前请求的文件路径
            # $uri/: 当前请求的目录路径
            # /index.html: 如果都找不到，返回index.html
            # 这是SPA（单页应用）的关键配置，支持前端路由
            try_files $uri $uri/ /index.html;
        }

        # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$:
        # 匹配静态资源文件（不区分大小写）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # expires 1y: 设置缓存时间为1年
            # 静态资源通常不会频繁变化，可以设置较长的缓存时间
            expires 1y;
            
            # add_header Cache-Control: 添加缓存控制头
            # public: 允许公共缓存（如CDN）
            # immutable: 资源不可变，浏览器不会发送条件请求验证
            add_header Cache-Control "public, immutable";
        }

        # error_page: 错误页面配置
        # 当出现500/502/503/504错误时，返回/50x.html
        error_page   500 502 503 504  /50x.html;
        
        # location = /50x.html: 精确匹配50x.html请求
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}